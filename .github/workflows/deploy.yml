name: Deploy to Streamlit Cloud

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Validate app syntax
      run: |
        echo "🔍 Validating Python syntax..."
        python -m py_compile app.py
        python -m py_compile config.py
        echo "✅ Syntax validation passed"

    - name: Test imports
      run: |
        echo "🔍 Testing imports..."
        python -c "
        import sys
        try:
            import streamlit as st
            import plotly.express as px
            import plotly.graph_objects as go
            import pandas as pd
            import numpy as np
            from config import *
            print('✅ All imports successful')
        except ImportError as e:
            print(f'❌ Import error: {e}')
            sys.exit(1)
        except Exception as e:
            print(f'❌ Other error: {e}')
            sys.exit(1)
        "

    - name: Validate configuration files
      run: |
        echo "🔍 Validating configuration files..."
        if [ -f "config.toml" ]; then
          echo "✅ config.toml found"
        else
          echo "❌ config.toml missing"
          exit 1
        fi
        
        if [ -f "requirements.txt" ]; then
          echo "✅ requirements.txt found"
        else
          echo "❌ requirements.txt missing"
          exit 1
        fi

    - name: Deployment notification
      run: |
        echo "🚀 Deployment validation completed successfully!"
        echo ""
        echo "📋 Deployment Status:"
        echo "  ✅ Code syntax validated"
        echo "  ✅ Dependencies installed"
        echo "  ✅ Imports tested"
        echo "  ✅ Configuration files validated"
        echo "  ✅ Basic functionality verified"
        echo ""
        echo "🔄 Streamlit Cloud Auto-Deployment:"
        echo "  • Branch: main"
        echo "  • Status: Ready for deployment"
        echo "  • URL: https://apptrends-3cak83raxbjlbfqm8zgvnr.streamlit.app/"
        echo ""
        echo "📝 Configuration Files Included:"
        echo "  ✅ config.toml - Streamlit theme and server settings"
        echo "  ✅ requirements.txt - Python dependencies (pinned versions)"
        echo "  ✅ .streamlit/ - Configuration directory"
        echo ""
        echo "🔧 To ensure auto-deployment works:"
        echo "  1. Go to https://share.streamlit.io/"
        echo "  2. Find your 'googletrends' app"
        echo "  3. Click ⋮ menu → Settings"
        echo "  4. Under 'Deployment':"
        echo "     • Branch: main ✓"
        echo "     • Auto-deploy: ON ✓"
        echo "     • File path: app.py ✓"
        echo "  5. Save settings"
        echo ""
        echo "✅ Workflow triggers on every push to main branch"
        echo "✅ Auto-deployment should happen within 1-2 minutes"